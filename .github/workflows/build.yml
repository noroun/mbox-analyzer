name: Build executables

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # Permet de lancer manuellement depuis l'onglet Actions

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name ZoquerGMail mbox_analyzer.py

      - name: Sign and notarize
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Importer le certificat dans un keychain temporaire
          echo "$APPLE_CERT_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "temp-keychain-password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp-keychain-password" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp-keychain-password" build.keychain
          rm certificate.p12

          # Signer
          codesign --deep --force --verify --verbose \
            --sign "Developer ID Application: $(security find-certificate -c 'Developer ID Application' -p build.keychain | openssl x509 -noout -subject | sed 's/.*CN=\(.*\), OU.*/\1/')" \
            --options runtime \
            --entitlements /dev/stdin \
            dist/ZoquerGMail.app <<'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key><false/>
            <key>com.apple.security.cs.disable-library-validation</key><true/>
          </dict>
          </plist>
          ENTITLEMENTS

          # Notariser
          ditto -c -k --keepParent dist/ZoquerGMail.app ZoquerGMail-notarize.zip
          xcrun notarytool submit ZoquerGMail-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          rm ZoquerGMail-notarize.zip

          # Agrafer le ticket
          xcrun stapler staple dist/ZoquerGMail.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoquerGMail-macOS
          path: dist/ZoquerGMail.app

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name ZoquerGMail mbox_analyzer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoquerGMail-Windows
          path: dist/ZoquerGMail.exe

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
